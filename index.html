<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup 2022 — Knockout Bracket</title>
<style>
  :root { --ink:#15233b; --gold:#d4af37; --line:#9fb0c7; --win:#1b6b3a; --bg:#f4f6fb; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:"Segoe UI",Helvetica,Arial,sans-serif; }
  header { text-align:center; padding:24px 16px 8px; }
  header h1 { margin:0; font-size:26px; }
  header p { margin:6px 0 0; color:var(--gold); font-weight:700; }
  .bracket { display:flex; gap:48px; padding:24px 32px 40px; overflow-x:auto;
             align-items:stretch; }
  .round { display:flex; flex-direction:column; justify-content:space-around;
           min-width:170px; }
  .round h2 { font-size:13px; text-transform:uppercase; letter-spacing:.05em;
              opacity:.6; text-align:center; margin:0 0 12px; }
  .match { background:#fff; border:1px solid var(--line); border-radius:8px;
           margin:10px 0; overflow:hidden; transition:transform .12s, box-shadow .12s; }
  .match:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(21,35,59,.15); }
  .team { display:flex; justify-content:space-between; align-items:center;
          padding:8px 12px; font-size:14px; }
  .team + .team { border-top:1px solid var(--bg); }
  .team.win { color:var(--win); font-weight:700; }
  .team .score { color:var(--gold); font-weight:700; font-size:12px; }
  .champ { display:flex; flex-direction:column; justify-content:center; align-items:center;
           min-width:170px; }
  .trophy { font-size:46px; }
  .champ .name { font-size:20px; font-weight:800; margin-top:8px; }
  .third { text-align:center; padding:0 32px 32px; color:var(--ink); }
  .third .match { display:inline-block; min-width:200px; text-align:left; }
  footer { text-align:center; padding:8px 16px 28px; font-size:12px; opacity:.5; }
</style>
</head>
<body>
<header>
  <h1 id="title">FIFA World Cup 2022 — Qatar</h1>
  <p id="subtitle"></p>
</header>

<div class="bracket" id="bracket"></div>

<div class="third">
  <h2 style="opacity:.6;text-transform:uppercase;font-size:13px;letter-spacing:.05em">Third-place play-off</h2>
  <div id="third"></div>
</div>

<footer>Generated bracket · data in <code>data/wc2022_knockout.json</code></footer>

<script>
const DATA = {
  "tournament": "FIFA World Cup 2022 — Qatar",
  "champion": "Argentina",
  "rounds": {
    "round_of_16": [
      { "home": "Netherlands", "away": "USA",         "score": "3–1" },
      { "home": "Argentina",   "away": "Australia",   "score": "2–1" },
      { "home": "Japan",       "away": "Croatia",     "score": "1–1", "pens": "1–3" },
      { "home": "Brazil",      "away": "South Korea", "score": "4–1" },
      { "home": "England",     "away": "Senegal",     "score": "3–0" },
      { "home": "France",      "away": "Poland",      "score": "3–1" },
      { "home": "Morocco",     "away": "Spain",       "score": "0–0", "pens": "3–0" },
      { "home": "Portugal",    "away": "Switzerland", "score": "6–1" }
    ],
    "quarter_finals": [
      { "home": "Netherlands", "away": "Argentina",   "score": "2–2", "pens": "3–4" },
      { "home": "Croatia",     "away": "Brazil",      "score": "1–1", "pens": "4–2" },
      { "home": "Morocco",     "away": "Portugal",    "score": "1–0" },
      { "home": "England",     "away": "France",      "score": "1–2" }
    ],
    "semi_finals": [
      { "home": "Argentina",   "away": "Croatia",     "score": "3–0" },
      { "home": "France",      "away": "Morocco",     "score": "2–0" }
    ],
    "final": [
      { "home": "Argentina",   "away": "France",      "score": "3–3", "pens": "4–2" }
    ],
    "third_place": [
      { "home": "Croatia",     "away": "Morocco",     "score": "2–1" }
    ]
  }
};

function winner(m){
  if(m.pens){ const [a,b]=m.pens.split("–").map(Number); return a>b?m.home:m.away; }
  const [a,b]=m.score.split("–").map(Number); return a>b?m.home:m.away;
}
function matchEl(m){
  const w = winner(m);
  const tail = m.pens ? ` (${m.pens} p)` : "";
  const row = (side,extra) =>
    `<div class="team${m[side]===w?" win":""}"><span>${m[side]}</span><span class="score">${extra}</span></div>`;
  return `<div class="match">${row("home", m.score+tail)}${row("away","")}</div>`;
}

const cols = [
  ["Round of 16", DATA.rounds.round_of_16],
  ["Quarter-finals", DATA.rounds.quarter_finals],
  ["Semi-finals", DATA.rounds.semi_finals],
  ["Final", DATA.rounds.final],
];
const bracket = document.getElementById("bracket");
for(const [label, ms] of cols){
  const div = document.createElement("div");
  div.className = "round";
  div.innerHTML = `<h2>${label}</h2>` + ms.map(matchEl).join("");
  bracket.appendChild(div);
}
const champ = document.createElement("div");
champ.className = "champ";
champ.innerHTML = `<div class="trophy">🏆</div><div class="name">${DATA.champion}</div>`;
bracket.appendChild(champ);

document.getElementById("title").textContent = DATA.tournament;
document.getElementById("subtitle").textContent = "🏆 Champion: " + DATA.champion;
document.getElementById("third").innerHTML = matchEl(DATA.rounds.third_place[0]);
</script>
</body>
</html>
